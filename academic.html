<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบวิชาการ - เช็คชื่อรายวิชา</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; min-height: 100vh; }
        .banner { background: linear-gradient(135deg, #0d47a1, #1976d2); color: white; padding: 20px 0; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .card-custom { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .radio-group input[type="radio"] { display: none; }
        .radio-group label { padding: 6px 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.2s; text-align: center; width: 100%; }
        
        .radio-group input[value="present"]:checked + label { background-color: #d1e7dd; color: #0f5132; border-color: #badbcc; }
        .radio-group input[value="absent"]:checked + label { background-color: #f8d7da; color: #842029; border-color: #f5c2c7; }
        .radio-group input[value="leave"]:checked + label { background-color: #fff3cd; color: #664d03; border-color: #ffecb5; }
        .radio-group input[value="late"]:checked + label { background-color: #cff4fc; color: #055160; border-color: #b6effb; }

        .table-responsive { border-radius: 10px; overflow: hidden; }
        th { background-color: #f8f9fa !important; }
    </style>
</head>
<body>

    <div class="banner text-center">
        <div class="container">
            <h3 class="fw-bold m-0"><i class="bi bi-book-half"></i> Academic Attendance</h3>
            <p class="m-0 text-white-50">ระบบเช็คชื่อเข้าเรียนรายวิชา (ตาม Sec)</p>
        </div>
    </div>

    <div class="container pb-5">
        
        <div class="card-custom mb-4">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-bold text-primary">วันที่สอน</label>
                    <input type="date" id="checkDate" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold text-primary">Sec</label>
                    <select id="secNumber" class="form-select">
                        <option value="">-- เลือก Sec --</option>
                        <option value="SEC1">SEC1</option>
                        <option value="SEC2">SEC2</option>
                        <option value="SEC3">SEC3</option>
                        <option value="SEC4">SEC4</option>
                        <option value="SEC5">SEC5</option>
                        <option value="SEC6">SEC6</option>
                        <option value="SEC7">SEC7</option>
                        <option value="SEC8">SEC8</option>
                        <option value="SEC9">SEC9</option>
                        <option value="SEC10">SEC10</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold text-primary">วิชาที่สอน</label>
                    <select id="subjectName" class="form-select" onchange="autoFillTeacher()">
                        <option value="">-- กำลังโหลดข้อมูลวิชา... --</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold text-primary">คาบเรียน</label>
                    <select id="checkPeriod" class="form-select">
                        <option value="คาบ 1">คาบ 1</option>
                        <option value="คาบ 2">คาบ 2</option>
                        <option value="คาบ 3">คาบ 3</option>
                        <option value="คาบ 4">คาบ 4</option>
                        <option value="คาบ 5">คาบ 5</option>
                        <option value="คาบ 6">คาบ 6</option>
                        <option value="คาบ 7">คาบ 7</option>
                        <option value="คาบ 8">คาบ 8</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="form-label fw-bold text-primary">ชื่อครูผู้สอน</label>
                    <input type="text" id="teacherName" class="form-control bg-light" placeholder="ระบบจะดึงชื่อครูอัตโนมัติเมื่อเลือกวิชา" readonly>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button onclick="loadStudents()" class="btn btn-primary w-100 fw-bold">
                        <i class="bi bi-person-lines-fill"></i> โหลดรายชื่อนักเรียน
                    </button>
                </div>
            </div>
        </div>

        <div class="card-custom" id="attendanceSection" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <h5 class="fw-bold m-0 text-primary" id="tableTitle">รายชื่อนักเรียน</h5>
                <button onclick="saveAttendance()" class="btn btn-dark rounded-pill fw-bold px-4">
                    <i class="bi bi-cloud-upload"></i> บันทึกผลการเช็คชื่อ
                </button>
            </div>
            
            <div class="table-responsive border">
                <table class="table table-hover align-middle mb-0">
                    <thead class="text-center text-secondary small">
                        <tr>
                            <th width="15%">รหัส</th>
                            <th width="35%" class="text-start">ชื่อ - นามสกุล</th>
                            <th width="50%">สถานะการเข้าเรียน</th>
                        </tr>
                    </thead>
                    <tbody id="studentList"></tbody>
                </table>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="text-secondary text-decoration-none"><i class="bi bi-arrow-left"></i> กลับหน้าเมนูหลัก</a>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://pqkaqsxmbewilzruogdw.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxa2Fxc3htYmV3aWx6cnVvZ2R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0ODgzMTksImV4cCI6MjA4NDA2NDMxOX0.TFyfNcFXcUUF29Iexmkjf6EaNIXAv8KuOFY_ydAY_z8'; 
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('checkDate').valueAsDate = new Date();

        let currentStudents = [];
        let teacherDataList = []; 

        // 🔥 ดึงรายชื่อวิชาจากตาราง 'teachers'
        document.addEventListener('DOMContentLoaded', fetchSubjects);

        async function fetchSubjects() {
            try {
                // ⚠️ สำคัญ: ตรวจสอบให้แน่ใจว่าชื่อตารางคือ 'teachers' 
                // และมีคอลัมน์ 'subject', 'fullname' ตามรูป
                const { data, error } = await client
                    .from('teachers') 
                    .select('subject, fullname');

                if (error) throw error;

                // กรองเอาเฉพาะรายการที่มีชื่อวิชา (ไม่เอาที่ว่างๆ หรือ null)
                teacherDataList = data.filter(item => item.subject && item.subject.trim() !== '' && item.subject !== 'EMPTY'); 

                // กรองชื่อวิชาไม่ให้ซ้ำกัน
                const uniqueSubjects = [...new Set(teacherDataList.map(item => item.subject))];

                let subjectSelect = document.getElementById('subjectName');
                let html = '<option value="">-- เลือกวิชาที่สอน --</option>';
                
                uniqueSubjects.forEach(sub => {
                    html += `<option value="${sub}">${sub}</option>`;
                });

                subjectSelect.innerHTML = html;

            } catch (err) {
                console.error("Error fetching subjects:", err);
                document.getElementById('subjectName').innerHTML = '<option value="">-- โหลดข้อมูลวิชาล้มเหลว --</option>';
            }
        }

        // 🔥 ฟังก์ชันเติมชื่อครูอัตโนมัติ
        function autoFillTeacher() {
            const selectedSubject = document.getElementById('subjectName').value;
            const teacherInput = document.getElementById('teacherName');

            if (!selectedSubject) {
                teacherInput.value = '';
                return;
            }

            // หาชื่อครู ('fullname') ที่ตรงกับวิชา ('subject')
            const matchedTeacher = teacherDataList.find(t => t.subject === selectedSubject);
            
            if (matchedTeacher) {
                teacherInput.value = matchedTeacher.fullname;
            } else {
                teacherInput.value = ''; 
            }
        }

        // ==========================================
        // ส่วนดึงรายชื่อนักเรียนและบันทึกข้อมูล
        // ==========================================

        async function loadStudents() {
            const checkDate = document.getElementById('checkDate').value;
            const secNum = document.getElementById('secNumber').value;
            const subject = document.getElementById('subjectName').value.trim();
            const period = document.getElementById('checkPeriod').value;

            if (!checkDate || !secNum || !subject || !period) {
                Swal.fire('แจ้งเตือน', 'กรุณาระบุ วันที่, Sec, วิชา และคาบเรียนให้ครบ', 'warning');
                return;
            }

            Swal.fire({ title: 'กำลังดึงข้อมูล...', didOpen: () => Swal.showLoading() });

            try {
                // 1. ดึงรายชื่อเด็กตาม Sec
                const { data: students, error: err1 } = await client
                    .from('students')
                    .select('*')
                    .eq('sec', secNum) 
                    .order('student_id', { ascending: true });

                if (err1) throw err1;

                // 2. ดึงข้อมูลที่เคยเช็คไว้
                const { data: attendance, error: err2 } = await client
                    .from('daily_attendance')
                    .select('student_id, status, teacher_name')
                    .eq('check_date', checkDate)
                    .eq('module_type', 'academic')
                    .eq('target_group', secNum)
                    .eq('subject_name', subject)
                    .eq('period', period);
                
                if (err2) throw err2;

                // อัปเดตชื่อครู (กรณีโหลดข้อมูลเก่าขึ้นมาดู)
                if (attendance.length > 0) {
                    document.getElementById('teacherName').value = attendance[0].teacher_name;
                }

                let savedStatusMap = {};
                attendance.forEach(rec => { savedStatusMap[rec.student_id] = rec.status; });

                currentStudents = students;
                renderTable(students, savedStatusMap, secNum, subject, period);
                Swal.close();

            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'โหลดข้อมูลไม่สำเร็จ', 'error');
            }
        }

        function renderTable(students, savedStatusMap, secNum, subject, period) {
            document.getElementById('attendanceSection').style.display = 'block';
            document.getElementById('tableTitle').innerHTML = `${subject} - <span class="text-primary">${secNum} (${period})</span>`;

            let html = '';
            if (students.length === 0) {
                html = `<tr><td colspan="3" class="text-center py-4 text-muted">ไม่พบนักเรียนใน ${secNum}</td></tr>`;
            } else {
                students.forEach(std => {
                    let currentStatus = savedStatusMap[std.student_id] || 'present';
                    const statuses = ['present', 'absent', 'leave', 'late'];
                    const labels = ['มา', 'ขาด', 'ลา', 'สาย'];

                    html += `<tr>
                        <td class="text-center font-monospace small">${std.student_id}</td>
                        <td class="fw-bold">${std.fullname}</td>
                        <td>
                            <div class="row g-1 radio-group">
                                ${statuses.map((s, i) => `
                                    <div class="col-3">
                                        <input type="radio" name="status_${std.student_id}" id="${s}_${std.student_id}" value="${s}" ${currentStatus === s ? 'checked' : ''}>
                                        <label for="${s}_${std.student_id}">${labels[i]}</label>
                                    </div>
                                `).join('')}
                            </div>
                        </td>
                    </tr>`;
                });
            }
            document.getElementById('studentList').innerHTML = html;
        }

        async function saveAttendance() {
            const checkDate = document.getElementById('checkDate').value;
            const secNum = document.getElementById('secNumber').value;
            const subject = document.getElementById('subjectName').value.trim();
            const period = document.getElementById('checkPeriod').value;
            const teacher = document.getElementById('teacherName').value.trim();

            if (!teacher) {
                Swal.fire('ลืมใส่ชื่อครู!', 'กรุณาระบุชื่อครูผู้สอนก่อนบันทึก', 'warning');
                return;
            }

            let recordsToInsert = currentStudents.map(std => {
                const status = document.querySelector(`input[name="status_${std.student_id}"]:checked`).value;
                return {
                    check_date: checkDate,
                    module_type: 'academic',
                    student_id: std.student_id,
                    status: status,
                    target_group: secNum,
                    subject_name: subject,
                    period: period,
                    teacher_name: teacher
                };
            });

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                // ลบข้อมูลเดิมทิ้งก่อนบันทึก
                await client.from('daily_attendance')
                    .delete()
                    .eq('check_date', checkDate)
                    .eq('module_type', 'academic')
                    .eq('target_group', secNum)
                    .eq('subject_name', subject)
                    .eq('period', period);

                const { error } = await client.from('daily_attendance').insert(recordsToInsert);
                if (error) throw error;

                Swal.fire({ icon: 'success', title: 'บันทึกเรียบร้อย!', timer: 1500, showConfirmButton: false });

            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'บันทึกไม่สำเร็จ', 'error');
            }
        }
    </script>
</body>
</html>
