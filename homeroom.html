<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homeroom (เช้า-บ่าย)</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; min-height: 100vh; }
        .banner { background: linear-gradient(135deg, #2e7d32, #4caf50); color: white; padding: 30px 0; border-radius: 0 0 25px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .card-custom { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: none; }
        
        .radio-group input[type="radio"] { display: none; }
        .radio-group label { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: 0.2s; text-align: center; width: 100%; }
        
        .radio-group input[value="present"]:checked + label { background-color: #d1e7dd; color: #0f5132; border-color: #badbcc; }
        .radio-group input[value="absent"]:checked + label { background-color: #f8d7da; color: #842029; border-color: #f5c2c7; }
        .radio-group input[value="leave"]:checked + label { background-color: #fff3cd; color: #664d03; border-color: #ffecb5; }
        .radio-group input[value="late"]:checked + label { background-color: #cff4fc; color: #055160; border-color: #b6effb; }

        .table-responsive { border-radius: 10px; overflow: hidden; }
        .sticky-header { position: sticky; top: 0; background: white; z-index: 100; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="banner text-center">
        <div class="container">
             <img src="https://img2.pic.in.th/pic/PSUWIT_Circle.png" class="logo-circle" width = "120">
            <h2 class="fw-bold m-0"><i class="bi bi-house-door-fill"></i> Homeroom Attendance</h2>
            <p class="m-0 text-white-50 mt-1">ระบบเช็คชื่อHomeroom (รอบเช้า-บ่าย)</p>
        </div>
    </div>

    <div class="container pb-5">
        
        <div class="card-custom mb-4">
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label fw-bold text-success">วันที่</label>
                    <input type="date" id="checkDate" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold text-success">รอบเวลา</label>
                    <select id="checkPeriod" class="form-select" required>
                        <option value="เช้า">รอบเช้า</option>
                        <option value="บ่าย">รอบบ่าย</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold text-success">บ้าน (House)</label>
                    <select id="houseNumber" class="form-select" onchange="filterTeachers()" required>
                        <option value="">-- เลือกบ้าน --</option>
                        <option value="บ้าน1">บ้าน 1</option>
                        <option value="บ้าน2">บ้าน 2</option>
                        <option value="บ้าน3">บ้าน 3</option>
                        <option value="บ้าน4">บ้าน 4</option>
                        <option value="บ้าน5">บ้าน 5</option>
                        <option value="บ้าน6">บ้าน 6</option>
                        <option value="บ้าน7">บ้าน 7</option>
                        <option value="บ้าน8">บ้าน 8</option>
                        <option value="บ้าน9">บ้าน 9</option>
                        <option value="บ้าน10">บ้าน 10</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold text-success">ครูผู้บันทึก</label>
                    <select id="teacherSelect" class="form-select" required>
                        <option value="">-- กรุณาเลือกบ้านก่อน --</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button onclick="loadStudents()" class="btn btn-success w-100 fw-bold">
                        <i class="bi bi-search"></i> โหลดรายชื่อ
                    </button>
                </div>
            </div>
        </div>

        <div class="card-custom" id="attendanceSection" style="display: none;">
            <div class="sticky-header d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <h5 class="fw-bold m-0 text-success" id="tableTitle">รายชื่อนักเรียน</h5>
                <button onclick="saveAttendance()" class="btn btn-primary rounded-pill fw-bold px-4 shadow-sm">
                    <i class="bi bi-cloud-check"></i> บันทึกข้อมูล
                </button>
            </div>
            
            <div class="table-responsive border">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-center">
                        <tr>
                            <th width="15%">รหัส</th>
                            <th width="35%" class="text-start">ชื่อ - นามสกุล</th>
                            <th width="50%">สถานะการมาเรียน</th>
                        </tr>
                    </thead>
                    <tbody id="studentList">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="text-secondary text-decoration-none"><i class="bi bi-arrow-left"></i> กลับหน้าเมนูหลัก</a>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://pqkaqsxmbewilzruogdw.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxa2Fxc3htYmV3aWx6cnVvZ2R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0ODgzMTksImV4cCI6MjA4NDA2NDMxOX0.TFyfNcFXcUUF29Iexmkjf6EaNIXAv8KuOFY_ydAY_z8'; 
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentStudents = [];
        let masterTeachers = []; // เก็บข้อมูลครูทั้งหมด

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('checkDate').valueAsDate = new Date();
            await loadTeacherData();
        });

        // 🔥 ดึงข้อมูลครูทั้งหมด รวมถึงข้อมูล "บ้าน (house)" มาเก็บไว้
        async function loadTeacherData() {
            try {
                // ดึงคอลัมน์ house และ fullname จากตาราง teachers 
                const { data, error } = await client.from('teachers').select('house, fullname').range(0, 9999);
                if (error) throw error;

                masterTeachers = data.map(item => ({
                    house: item.house ? item.house.trim() : '',
                    fullname: item.fullname ? item.fullname.trim() : ''
                }));

            } catch (err) {
                console.error("Error loading teachers:", err);
                document.getElementById('teacherSelect').innerHTML = '<option value="">-- โหลดข้อมูลครูล้มเหลว --</option>';
            }
        }

        // 🔥 กรองรายชื่อครู ตาม "บ้าน" ที่เลือก
        function filterTeachers() {
            const selectedHouse = document.getElementById('houseNumber').value;
            const teacherSelect = document.getElementById('teacherSelect');
            
            teacherSelect.innerHTML = '<option value="">-- เลือกครูผู้บันทึก --</option>';

            if (!selectedHouse) return;

            // กรองครูเฉพาะคนที่อยู่บ้านที่เลือก
            const filtered = masterTeachers.filter(t => t.house === selectedHouse);
            
            // ป้องกันชื่อครูซ้ำซ้อน และเรียง ก-ฮ
            const uniqueTeachers = [...new Set(filtered.map(t => t.fullname))].filter(t => t !== '');
            uniqueTeachers.sort((a, b) => a.localeCompare(b, 'th'));

            uniqueTeachers.forEach(t => {
                teacherSelect.innerHTML += `<option value="${t}">${t}</option>`;
            });
        }

        async function loadStudents() {
            const checkDate = document.getElementById('checkDate').value;
            const checkPeriod = document.getElementById('checkPeriod').value;
            const houseNum = document.getElementById('houseNumber').value;

            if (!checkDate || !houseNum || !checkPeriod) {
                Swal.fire('แจ้งเตือน', 'กรุณาเลือกวันที่ รอบเวลา และบ้าน ให้ครบถ้วน', 'warning');
                return;
            }

            Swal.fire({ title: 'กำลังโหลดข้อมูล...', didOpen: () => Swal.showLoading() });

            try {
                const { data: students, error: err1 } = await client
                    .from('students')
                    .select('*')
                    .eq('house', houseNum) 
                    .order('student_id', { ascending: true })
                    .range(0, 9999);

                if (err1) throw err1;

                const { data: attendance, error: err2 } = await client
                    .from('daily_attendance')
                    .select('student_id, status, recorded_by')
                    .eq('check_date', checkDate)
                    .eq('module_type', 'homeroom')
                    .eq('target_group', houseNum)
                    .eq('period', checkPeriod)
                    .range(0, 9999);
                
                if (err2) throw err2;

                // หากดึงประวัติเก่ามา ให้แสดงชื่อครูคนเดิม
                if (attendance.length > 0 && attendance[0].recorded_by) {
                    document.getElementById('teacherSelect').value = attendance[0].recorded_by;
                }

                let savedStatusMap = {};
                attendance.forEach(rec => { savedStatusMap[rec.student_id] = rec.status; });

                currentStudents = students;
                renderTable(students, savedStatusMap, houseNum, checkPeriod);
                Swal.close();

            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'ไม่สามารถโหลดข้อมูลได้', 'error');
            }
        }

        function renderTable(students, savedStatusMap, houseNum, checkPeriod) {
            document.getElementById('attendanceSection').style.display = 'block';
            document.getElementById('tableTitle').innerHTML = `รายชื่อนักเรียน - <span class="text-success">${houseNum} (รอบ${checkPeriod})</span> <small class="text-muted">(${students.length} คน)</small>`;

            let html = '';
            if (students.length === 0) {
                html = `<tr><td colspan="3" class="text-center py-4 text-muted">ไม่พบรายชื่อนักเรียนใน ${houseNum}</td></tr>`;
            } else {
                students.forEach(std => {
                    let currentStatus = savedStatusMap[std.student_id] || 'present';

                    const isP = currentStatus === 'present' ? 'checked' : '';
                    const isA = currentStatus === 'absent' ? 'checked' : '';
                    const isL = currentStatus === 'leave' ? 'checked' : '';
                    const isT = currentStatus === 'late' ? 'checked' : '';

                    html += `
                    <tr>
                        <td class="text-center font-monospace text-secondary fw-bold">${std.student_id}</td>
                        <td class="fw-bold">${std.fullname}</td>
                        <td>
                            <div class="row g-1 radio-group">
                                <div class="col-3">
                                    <input type="radio" name="status_${std.student_id}" id="p_${std.student_id}" value="present" ${isP}>
                                    <label for="p_${std.student_id}">มา</label>
                                </div>
                                <div class="col-3">
                                    <input type="radio" name="status_${std.student_id}" id="a_${std.student_id}" value="absent" ${isA}>
                                    <label for="a_${std.student_id}">ขาด</label>
                                </div>
                                <div class="col-3">
                                    <input type="radio" name="status_${std.student_id}" id="l_${std.student_id}" value="leave" ${isL}>
                                    <label for="l_${std.student_id}">ลา</label>
                                </div>
                                <div class="col-3">
                                    <input type="radio" name="status_${std.student_id}" id="t_${std.student_id}" value="late" ${isT}>
                                    <label for="t_${std.student_id}">สาย</label>
                                </div>
                            </div>
                        </td>
                    </tr>`;
                });
            }
            document.getElementById('studentList').innerHTML = html;
        }

        async function saveAttendance() {
            const checkDate = document.getElementById('checkDate').value;
            const checkPeriod = document.getElementById('checkPeriod').value;
            const houseNum = document.getElementById('houseNumber').value;
            const teacher = document.getElementById('teacherSelect').value;

            if (!teacher) {
                Swal.fire('ระบุครูผู้บันทึก', 'กรุณาเลือกรายชื่อครูผู้บันทึกก่อนกดเซฟ', 'warning');
                return;
            }

            if (currentStudents.length === 0) return;

            // รวบรวมข้อมูลจากหน้าจอ
            let recordsToInsert = [];
            currentStudents.forEach(std => {
                const status = document.querySelector(`input[name="status_${std.student_id}"]:checked`).value;
                
                recordsToInsert.push({
                    check_date: checkDate,
                    module_type: 'homeroom',
                    student_id: std.student_id,
                    status: status,
                    target_group: houseNum,
                    period: checkPeriod, 
                    recorded_by: teacher 
                });
            });

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                // ลบข้อมูลเดิมของ "วัน+รอบ+บ้าน" นี้ทิ้งก่อนบันทึกใหม่
                await client.from('daily_attendance')
                    .delete()
                    .eq('check_date', checkDate)
                    .eq('module_type', 'homeroom')
                    .eq('target_group', houseNum)
                    .eq('period', checkPeriod);

                // บันทึกข้อมูลใหม่
                const { error } = await client.from('daily_attendance').insert(recordsToInsert);
                if (error) throw error;

                Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', timer: 1500, showConfirmButton: false });

            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'บันทึกข้อมูลไม่สำเร็จ', 'error');
            }
        }
    </script>
</body>
</html>
