<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประเมินกิจกรรม - SMART WiTH care and share</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; }
        .header-banner { background: linear-gradient(135deg, #1565c0, #0d47a1); color: white; padding: 30px 0; border-radius: 0 0 25px 25px; margin-bottom: 30px; }
        .filter-card { background: white; border-radius: 15px; border: none; box-shadow: 0 4px 12px rgba(13, 71, 161, 0.1); padding: 25px; }
        .student-card { background: white; border-radius: 15px; border: none; box-shadow: 0 4px 12px rgba(13, 71, 161, 0.1); padding: 20px; }
        
        .status-options input[type="radio"] { display: none; }
        .status-options label { 
            padding: 8px; border: 1px solid #dee2e6; border-radius: 8px; 
            cursor: pointer; width: 100%; text-align: center; font-size: 0.9rem; font-weight: 600;
            transition: all 0.2s;
        }
        .status-options input[value="pass"]:checked + label { background: #d1e7dd; color: #0f5132; border-color: #a3cfbb; }
        .status-options input[value="fail"]:checked + label { background: #f8d7da; color: #842029; border-color: #f1aeb5; }
        .status-options input[value="none"]:checked + label { background: #e2e3e5; color: #41464b; border-color: #c4c8cb; }

        .sticky-header { position: sticky; top: 0; background: white; z-index: 100; padding: 10px 0; border-bottom: 1px solid #eee; }
        .text-theme { color: #1565c0; }
        .bg-theme { background-color: #1565c0; }
        .bg-theme:hover { background-color: #0d47a1; color: white; }
    </style>
</head>
<body>

    <div class="header-banner text-center shadow">
        <div class="container">
            <h2 class="fw-bold"><i class="bi bi-shield-check"></i> ระบบประเมินกิจกรรมพิเศษ</h2>
            <p class="mb-0 text-light">School Lockdown & First Aid</p>
        </div>
    </div>

    <div class="container pb-5">
        
        <div class="filter-card mb-4">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-bold">วันที่จัดกิจกรรม</label>
                    <input type="date" id="checkDate" class="form-control form-control-lg">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold text-theme">เลือก กิจกรรม</label>
                    <select id="activitySelect" class="form-select form-select-lg">
                        <option value="">-- เลือกกิจกรรม --</option>
                        <option value="School Lockdown">School Lockdown</option>
                        <option value="First Aid">First Aid (ปฐมพยาบาล)</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">บ้าน (House)</label>
                    <!-- เพิ่ม onchange เพื่อกรองครูทันทีที่เปลี่ยนบ้าน -->
                    <select id="houseSelect" class="form-select form-select-lg" onchange="filterTeachersByHouse()">
                        <option value="">-- เลือกบ้าน --</option>
                        <option value="บ้าน1">บ้าน 1</option>
                        <option value="บ้าน2">บ้าน 2</option>
                        <option value="บ้าน3">บ้าน 3</option>
                        <option value="บ้าน4">บ้าน 4</option>
                        <option value="บ้าน5">บ้าน 5</option>
                        <option value="บ้าน6">บ้าน 6</option>
                        <option value="บ้าน7">บ้าน 7</option>
                        <option value="บ้าน8">บ้าน 8</option>
                        <option value="บ้าน9">บ้าน 9</option>
                        <option value="บ้าน10">บ้าน 10</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold text-theme">ครูผู้ประเมิน</label>
                    <select id="teacherSelect" class="form-select form-select-lg">
                        <option value="">-- กรุณาเลือกบ้านก่อน --</option>
                    </select>
                </div>
                <div class="col-md-12 d-flex align-items-end mt-4">
                    <button onclick="fetchStudentData()" class="btn btn-lg w-100 fw-bold text-white shadow-sm bg-theme">
                        <i class="bi bi-search"></i> ค้นหารายชื่อนักเรียน
                    </button>
                </div>
            </div>
        </div>

        <div id="attendanceArea" style="display: none;">
            <div class="sticky-header d-flex justify-content-between align-items-center mb-3">
                <h4 class="fw-bold m-0 text-theme" id="listTitle">รายชื่อนักเรียน</h4>
                <button onclick="saveToDatabase()" class="btn btn-lg px-5 fw-bold rounded-pill shadow text-white bg-theme">
                    <i class="bi bi-save2-fill"></i> บันทึกผลประเมิน
                </button>
            </div>

            <div class="alert alert-info py-2" id="activityNote">
                <!-- ข้อความแนะนำจะถูกแทรกที่นี่ด้วย JS -->
            </div>

            <div class="student-card">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr class="text-center">
                                <th width="15%">รหัสนักเรียน</th>
                                <th width="35%" class="text-start">ชื่อ-นามสกุล</th>
                                <th width="50%">ผลการประเมิน</th>
                            </tr>
                        </thead>
                        <tbody id="studentTbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Supabase Initialization
        const SUPABASE_URL = 'https://pqkaqsxmbewilzruogdw.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxa2Fxc3htYmV3aWx6cnVvZ2R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0ODgzMTksImV4cCI6MjA4NDA2NDMxOX0.TFyfNcFXcUUF29Iexmkjf6EaNIXAv8KuOFY_ydAY_z8'; 
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let masterStudents = [];
        let masterTeachers = []; // เพิ่มตัวแปรเก็บข้อมูลครูทั้งหมด

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('checkDate').valueAsDate = new Date();
            await loadTeacherData();
        });

        // โหลดรายชื่อครูและ "บ้าน" ของครูมาเก็บไว้
        async function loadTeacherData() {
            try {
                // สมมติว่าในตาราง teachers มีคอลัมน์ house
                const { data, error } = await client.from('teachers').select('fullname, house').range(0, 9999);
                if (error) throw error;
                
                // จัดระเบียบข้อมูลครู และล้างช่องว่างของชื่อบ้านเพื่อป้องกันความผิดพลาดตอนค้นหา
                masterTeachers = data.map(t => ({
                    fullname: t.fullname ? t.fullname.trim() : '',
                    house: t.house ? String(t.house).replace(/\s+/g, '').toUpperCase() : ''
                })).filter(t => t.fullname !== '');

            } catch (err) { console.error("Error loading teachers:", err); }
        }

        // ฟังก์ชันสำหรับกรองครูเมื่อเลือก "บ้าน"
        function filterTeachersByHouse() {
            const selectedHouse = document.getElementById('houseSelect').value;
            const teacherDropdown = document.getElementById('teacherSelect');

            if (!selectedHouse) {
                teacherDropdown.innerHTML = '<option value="">-- กรุณาเลือกบ้านก่อน --</option>';
                return;
            }

            const safeSelectedHouse = selectedHouse.replace(/\s+/g, '').toUpperCase();
            
            // กรองหาครูที่มี house ตรงกับที่เลือก
            const filteredTeachers = masterTeachers.filter(t => t.house === safeSelectedHouse);
            
            teacherDropdown.innerHTML = '<option value="">-- เลือกครูผู้ประเมิน --</option>';

            const uniqueTeachers = [...new Set(filteredTeachers.map(t => t.fullname))];
            
            if (uniqueTeachers.length === 0) {
                teacherDropdown.innerHTML = '<option value="">-- ไม่พบรายชื่อครูในบ้านนี้ --</option>';
            } else {
                uniqueTeachers.sort((a, b) => a.localeCompare(b, 'th')).forEach(t => {
                    teacherDropdown.innerHTML += `<option value="${t}">${t}</option>`;
                });
            }
        }

        async function fetchStudentData() {
            const date = document.getElementById('checkDate').value;
            const activity = document.getElementById('activitySelect').value;
            const house = document.getElementById('houseSelect').value;
            const teacher = document.getElementById('teacherSelect').value;

            if (!date || !activity || !house || !teacher) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกวันที่ กิจกรรม บ้าน และครูผู้ประเมินให้ครบถ้วน', 'warning');
                return;
            }

            const noteEl = document.getElementById('activityNote');
            if(activity === 'School Lockdown') {
                noteEl.innerHTML = `<strong><i class="bi bi-info-circle"></i> School Lockdown:</strong> ใครเช็คก็ได้ ระบบจะบันทึก <b>"ผลลัพธ์ล่าสุด"</b> ของบ้านนี้ทับข้อมูลเดิม`;
                noteEl.className = 'alert alert-warning py-2';
            } else {
                noteEl.innerHTML = `<strong><i class="bi bi-info-circle"></i> First Aid:</strong> ระบบจะบันทึกผลการประเมิน <b>"แยกตามรายชื่อครู"</b> (ครู 1 คน ต่อ 1 สิทธิ์การประเมิน)`;
                noteEl.className = 'alert alert-info py-2';
            }

            Swal.fire({ title: 'กำลังโหลดข้อมูล...', didOpen: () => Swal.showLoading() });

            try {
                const safeHouse = house.replace(/\s+/g, '').toUpperCase(); 
                let allStudents = [];
                let fetchStart = 0;
                let keepFetching = true;

                while (keepFetching) {
                    const { data: records, error: err1 } = await client
                        .from('students')
                        .select('student_id, fullname, house')
                        .order('student_id', { ascending: true })
                        .range(fetchStart, fetchStart + 999);

                    if (err1) throw err1;
                    if (records && records.length > 0) {
                        allStudents.push(...records);
                        fetchStart += records.length;
                    }
                    if (!records || records.length < 1000) keepFetching = false;
                }

                const students = allStudents.filter(s => {
                    const studentHouse = String(s.house || '').replace(/\s+/g, '').toUpperCase();
                    return studentHouse === safeHouse;
                });

                if (students.length === 0) {
                    Swal.fire('ไม่พบข้อมูล', 'ไม่มีรายชื่อนักเรียนในบ้านที่เลือก', 'warning');
                    return;
                }

                let query = client.from('daily_attendance')
                    .select('student_id, status, recorded_by')
                    .eq('check_date', date)
                    .eq('module_type', 'special_activity')
                    .eq('target_group', house)
                    .eq('subject_name', activity);

                if (activity === 'First Aid') {
                    query = query.eq('recorded_by', teacher);
                }

                const { data: history, error: err2 } = await query;
                if (err2) throw err2;

                const historyMap = {};
                history.forEach(h => historyMap[h.student_id] = h.status);

                masterStudents = students;
                renderStudentTable(students, historyMap);
                
                document.getElementById('attendanceArea').style.display = 'block';
                document.getElementById('listTitle').innerText = `รายชื่อ ${house} (${activity}) - ${students.length} คน`;
                Swal.close();

            } catch (e) {
                console.error(e);
                Swal.fire('Error', e.message || 'เกิดข้อผิดพลาดในการดึงข้อมูล', 'error');
            }
        }

        function renderStudentTable(students, historyMap) {
            const tbody = document.getElementById('studentTbody');
            tbody.innerHTML = '';
            
            students.forEach(s => {
                const currentStatus = historyMap[s.student_id] || 'none';
                tbody.innerHTML += `
                    <tr>
                        <td class="text-center font-monospace fw-bold text-secondary">${s.student_id}</td>
                        <td class="fw-bold">${s.fullname}</td>
                        <td>
                            <div class="row g-1 status-options">
                                <div class="col-4"><input type="radio" name="st_${s.student_id}" id="pass_${s.student_id}" value="pass" ${currentStatus==='pass'?'checked':''}><label for="pass_${s.student_id}"><i class="bi bi-check-circle"></i> ผ่าน</label></div>
                                <div class="col-4"><input type="radio" name="st_${s.student_id}" id="fail_${s.student_id}" value="fail" ${currentStatus==='fail'?'checked':''}><label for="fail_${s.student_id}"><i class="bi bi-x-circle"></i> ไม่ผ่าน</label></div>
                                <div class="col-4"><input type="radio" name="st_${s.student_id}" id="none_${s.student_id}" value="none" ${currentStatus==='none'?'checked':''}><label for="none_${s.student_id}">ไม่เข้าร่วม</label></div>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        async function saveToDatabase() {
            const date = document.getElementById('checkDate').value;
            const activity = document.getElementById('activitySelect').value;
            const house = document.getElementById('houseSelect').value;
            const teacher = document.getElementById('teacherSelect').value;
            
            const payload = masterStudents.map(s => ({
                check_date: date, 
                module_type: 'special_activity', 
                subject_name: activity,          
                student_id: s.student_id,
                status: document.querySelector(`input[name="st_${s.student_id}"]:checked`).value,
                target_group: house, 
                recorded_by: teacher 
            }));
            
            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                let deleteQuery = client.from('daily_attendance').delete()
                    .eq('check_date', date)
                    .eq('module_type', 'special_activity')
                    .eq('target_group', house)
                    .eq('subject_name', activity);

                if (activity === 'First Aid') {
                    deleteQuery = deleteQuery.eq('recorded_by', teacher);
                }

                await deleteQuery;

                const { error } = await client.from('daily_attendance').insert(payload);
                if (error) throw error;
                
                Swal.fire({ icon: 'success', title: 'บันทึกผลการประเมินเรียบร้อย', timer: 1500, showConfirmButton: false });
            } catch (e) { 
                console.error(e); 
                Swal.fire('Error', 'ไม่สามารถบันทึกข้อมูลได้', 'error'); 
            }
        }
    </script>
</body>
</html>
